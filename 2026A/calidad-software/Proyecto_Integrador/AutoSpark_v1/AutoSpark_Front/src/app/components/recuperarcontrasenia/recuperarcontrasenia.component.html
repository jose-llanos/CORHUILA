<div class="recuperar-container">
    <div class="form-container">
        <h2>Recuperar Contraseña</h2>
        <form (ngSubmit)="recuperarContrasenia()" #recuperarForm="ngForm">
            <label for="email">Correo electrónico</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                [(ngModel)]="email" 
                required
            />
            <button type="submit" [disabled]="!recuperarForm.form.valid">Enviar</button>
        </form>
    </div>
    
    <div class="image-container">
        <img src="https://aguagenesis.com/wp-content/uploads/2019/03/Lavaderos-de-Carros.jpg" alt="Car Wash">
    </div>
</div>

<div *ngIf="mostrarModal" class="modal">
    <div class="modal-content">
        <p>Revisa tu correo</p>
        <button (click)="cerrarModal()">Cerrar</button>
    </div>
</div>
