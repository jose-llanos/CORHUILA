# Configuración principal de la aplicación (Spring Boot 2.x).
#
# Por defecto, se usa H2 embebido en memoria para desarrollo local.
# En Docker, el datasource se sobreescribe mediante variables de entorno en docker-compose.yml.

server.port=8080

spring.datasource.url=jdbc:h2:mem:taskmanagerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.cache=false

logging.level.org.springframework.security=INFO
