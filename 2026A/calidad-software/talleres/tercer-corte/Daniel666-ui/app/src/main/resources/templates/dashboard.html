<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task Manager - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css"/>
</head>
<body>
<div class="container">
    <div class="nav">
        <div>
            <a th:href="@{/dashboard}" href="/dashboard"><strong>Dashboard</strong></a>
            <a th:href="@{/tasks}" href="/tasks">Tasks</a>
            <a th:href="@{/h2-console}" href="/h2-console" target="_blank">H2 Console</a>
        </div>
        <div class="actions">
            <span class="muted">Usuario: <span th:text="${username}">user</span></span>
            <form class="inline" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h1 class="title">Dashboard</h1>
        <p class="muted">Resumen del estado de las tareas.</p>

        <div class="row">
            <div class="stat">
                <div class="muted">Total</div>
                <div style="font-size: 26px; margin-top: 6px;" th:text="${totalTasks}">0</div>
            </div>
            <div class="stat" th:each="st : ${statuses}">
                <div class="muted" th:text="${st}">PENDING</div>
                <div style="font-size: 26px; margin-top: 6px;" th:text="${counts[st.name()]}">0</div>
            </div>
        </div>

        <div style="margin-top: 14px;">
            <a class="btn btn-primary" th:href="@{/tasks}">Ver lista de tareas</a>
            <a class="btn" th:href="@{/tasks/new}">Crear nueva tarea</a>
        </div>
    </div>
</div>
</body>
</html>
