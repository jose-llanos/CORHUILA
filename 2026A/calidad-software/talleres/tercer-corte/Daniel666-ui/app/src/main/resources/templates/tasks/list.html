<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Task Manager - Tasks</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" href="/css/styles.css"/>
</head>
<body>
<div class="container">
    <div class="nav">
        <div>
            <a th:href="@{/dashboard}" href="/dashboard">Dashboard</a>
            <a th:href="@{/tasks}" href="/tasks"><strong>Tasks</strong></a>
        </div>
        <div class="actions">
            <a id="newTaskButton" class="btn btn-primary" th:href="@{/tasks/new}">New Task</a>
            <form class="inline" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h1 class="title">Lista de tareas</h1>
        <p class="muted">Crea, edita, elimina y filtra por estado.</p>

        <div th:if="${message}" class="alert alert-ok" th:text="${message}">OK</div>

        <form id="filterForm" th:action="@{/tasks}" method="get" style="margin-top: 12px;">
            <label for="status">Filtrar por estado</label>
            <select id="status" name="status">
                <option value="" th:selected="${selectedStatus == null}">All</option>
                <option th:each="st : ${statuses}"
                        th:value="${st}"
                        th:text="${st}"
                        th:selected="${selectedStatus != null and st.name() == selectedStatus.name()}">PENDING</option>
            </select>
        </form>

        <table id="taskTable" aria-label="Task List">
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Created</th>
                <th>Updated</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="8" class="muted">No hay tareas para mostrar.</td>
            </tr>
            <tr th:each="t : ${tasks}" data-testid="taskRow">
                <td th:text="${t.id}">1</td>
                <td th:text="${t.title}">Title</td>
                <td th:text="${t.description}">Description</td>
                <td th:text="${t.status}">PENDING</td>
                <td th:text="${t.priority}">MEDIUM</td>
                <td th:text="${t.createdAt}">-</td>
                <td th:text="${t.updatedAt}">-</td>
                <td>
                    <div class="actions">
                        <a class="btn" data-testid="editTask" th:href="@{/tasks/{id}/edit(id=${t.id})}">Edit</a>
                        <form class="inline" th:action="@{/tasks/{id}/delete(id=${t.id})}" method="post" onsubmit="return confirmDelete();">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn btn-danger" data-testid="deleteTask" type="submit">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    (function () {
        var select = document.getElementById('status');
        var form = document.getElementById('filterForm');
        if (select && form) {
            select.addEventListener('change', function () {
                form.submit();
            });
        }
    })();

    function confirmDelete() {
        return window.confirm('¿Seguro que deseas eliminar esta tarea?');
    }
</script>
</body>
</html>
