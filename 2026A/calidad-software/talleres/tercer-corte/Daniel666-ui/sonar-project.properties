# Configuración de análisis SonarQube para Task Manager.
#
# Nota: se orienta a un escenario reproducible con Docker Compose (SonarQube en http://localhost:9000).

sonar.projectKey=taskmanager
sonar.projectName=Task Manager
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8
sonar.java.source=11

sonar.sources=app/src/main/java
sonar.tests=app/src/test/java

sonar.java.binaries=app/target/classes
sonar.junit.reportPaths=app/target/surefire-reports

sonar.coverage.jacoco.xmlReportPaths=reports/entrega-2/jacoco/jacoco.xml

sonar.exclusions=**/target/**,**/reports/**,**/docs/**,**/tests/**,**/docker/**
