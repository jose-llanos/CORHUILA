<div class="admin-container">
  <h2 class="titulo-admin">Administración de Tarifas</h2>

  <!-- Botón para agregar nueva tarifa -->
  <button class="agregar-btn" (click)="abrirFormulario()">Agregar Tarifa</button>

  <!-- Tabla de tarifas -->
  <table class="tarifa-table">
    <thead>
      <tr>
        <th>Tipo Vehículo</th>
        <th>Diurna</th>
        <th>Nocturna</th>
        <th>Imagen</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let tarifa of tarifas">
        <td>{{ tarifa.tipoVehiculo }}</td>
        <td>${{ tarifa.tarifaDiurna }}</td>
        <td>${{ tarifa.tarifaNocturna }}</td>
        <td><img [src]="tarifa.imagen" alt="Imagen del vehículo" width="60" /></td>
        <td>
          <button class="modificar-btn" (click)="editarTarifa(tarifa)">Modificar</button>
          <button class="eliminar-btn" *ngIf="tarifa.id" (click)="eliminarTarifa(tarifa.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Formulario para agregar/editar tarifas -->
  <div *ngIf="mostrarFormulario" class="formulario">
    <h3>{{ tarifaSeleccionada.id ? 'Modificar Tarifa' : 'Agregar Tarifa' }}</h3>

    <form (ngSubmit)="guardarTarifa()">
      <!-- Lista desplegable para seleccionar el tipo de vehículo -->
      <div class="form-group">
        <label for="tipoVehiculo">Tipo de Vehículo</label>
        <select
          id="tipoVehiculo"
          [(ngModel)]="tarifaSeleccionada.tipoVehiculo"
          name="tipoVehiculo"
          class="form-control"
          required
        >
          <option value="" disabled selected>Selecciona el tipo de vehículo</option>
          <option value="Moto">Moto</option>
          <option value="Camioneta">Camioneta</option>
          <option value="Automóvil">Automóvil</option>
        </select>
      </div>

      <!-- Campo para la tarifa diurna -->
      <div class="form-group">
        <label for="tarifaDiurna">Tarifa Diurna</label>
        <input
          type="number"
          id="tarifaDiurna"
          class="form-control"
          [(ngModel)]="tarifaSeleccionada.tarifaDiurna"
          name="tarifaDiurna"
          placeholder="Tarifa Diurna"
          required
        />
      </div>

      <!-- Campo para la tarifa nocturna -->
      <div class="form-group">
        <label for="tarifaNocturna">Tarifa Nocturna</label>
        <input
          type="number"
          id="tarifaNocturna"
          class="form-control"
          [(ngModel)]="tarifaSeleccionada.tarifaNocturna"
          name="tarifaNocturna"
          placeholder="Tarifa Nocturna"
          required
        />
      </div>

      <!-- Campo para la ruta de la imagen -->
      <div class="form-group">
        <label for="imagen">Ruta de la Imagen</label>
        <input
          type="text"
          id="imagen"
          class="form-control"
          [(ngModel)]="tarifaSeleccionada.imagen"
          name="imagen"
          placeholder="Ruta de la imagen"
          required
        />
      </div>

      <!-- Botones del formulario -->
      <div class="form-buttons">
        <button type="submit" class="guardar-btn">
          {{ tarifaSeleccionada.id ? 'Actualizar' : 'Guardar' }}
        </button>
        <button type="button" class="cancelar-btn" (click)="cancelar()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
