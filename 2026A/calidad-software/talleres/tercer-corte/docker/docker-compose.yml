services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT}:8080"
    environment:
      APP_JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - ../app:/app
    depends_on:
      db:
        condition: service_healthy
    networks: [qa-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
 
  db:
    image: postgres:15-alpine
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [qa-net]
 
  sonarqube:
    image: sonarqube:10-community
    ports:
      - "${SONAR_PORT}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/${SONAR_DB_NAME}
      SONAR_JDBC_USERNAME: ${DB_USER}
      SONAR_JDBC_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      db:
        condition: service_healthy
    networks: [qa-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
 
  # ============================================================
  # Selenium Grid (hub + nodos Chrome y Firefox)
  # ============================================================
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    networks: [qa-net]
    healthcheck:
      # Selenium 4: el endpoint correcto es /status (NO /wd/hub/status)
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
 
  selenium-chrome:
    image: selenium/node-chrome:4.27.0
    container_name: selenium-chrome
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    networks: [qa-net]
 
  selenium-firefox:
    image: selenium/node-firefox:4.27.0
    container_name: selenium-firefox
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    networks: [qa-net]
 
  # ============================================================
  # Jenkins con JDK 21 (imagen custom; ver docker/jenkins.Dockerfile)
  # ============================================================
  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    image: tasks-jenkins:lts-jdk21
    ports:
      - "${JENKINS_PORT}:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      app:
        condition: service_healthy
      sonarqube:
        condition: service_healthy
      selenium-hub:
        condition: service_healthy
    networks: [qa-net]
 
networks:
  qa-net:
    driver: bridge
 
volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  jenkins_data: