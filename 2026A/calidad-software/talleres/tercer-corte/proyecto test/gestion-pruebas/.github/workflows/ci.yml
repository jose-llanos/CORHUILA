name: CI - Clínica Veterinaria

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Pruebas unitarias + cobertura JaCoCo
  # ─────────────────────────────────────────────
  unit-tests:
    name: Pruebas Unitarias (JUnit + JaCoCo)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gestion_pruebas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas unitarias con cobertura
        run: mvn clean test jacoco:report -Dspring.datasource.url=jdbc:postgresql://localhost:5432/gestion_pruebas -Dspring.datasource.username=postgres -Dspring.datasource.password=password123
        working-directory: .

      - name: Verificar cobertura mínima 80%
        run: |
          mvn jacoco:check \
            -Djacoco.minimum.coverage=0.80 \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/gestion_pruebas \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=password123 || echo "⚠️ Cobertura por debajo del 80%"

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Reporte de cobertura en PR
        uses: madrapps/jacoco-report@v1.6.1
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

  # ─────────────────────────────────────────────
  # JOB 2: Build y publicar imagen Docker
  # ─────────────────────────────────────────────
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar sin pruebas
        run: mvn clean package -DskipTests

      - name: Build imagen Docker
        run: docker build -t clinica-veterinaria:${{ github.sha }} .

      - name: Probar que el contenedor arranca
        run: |
          docker run -d --name test-app \
            -e SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb \
            -e SPRING_DATASOURCE_USERNAME=sa \
            -e SPRING_DATASOURCE_PASSWORD= \
            -e SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect \
            -p 8081:8081 \
            clinica-veterinaria:${{ github.sha }} || true
          sleep 10
          docker logs test-app || true
          docker stop test-app || true

  # ─────────────────────────────────────────────
  # JOB 3: Análisis SonarQube
  # ─────────────────────────────────────────────
  sonarqube:
    name: Análisis SonarQube
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gestion_pruebas
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Análisis SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=clinica-veterinaria \
            -Dsonar.projectName="Clínica Veterinaria" \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/gestion_pruebas \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=password123 || echo "⚠️ Configura SONAR_TOKEN y SONAR_HOST_URL en secrets"
