# =============================================
# SonarQube - Configuración del Proyecto
# Clínica Veterinaria - Calidad de Software 2026A
# =============================================

sonar.projectKey=clinica-veterinaria
sonar.projectName=Clínica Veterinaria - Gestión de Pruebas
sonar.projectVersion=0.0.1

# Directorio raíz del proyecto
sonar.projectBaseDir=.

# Código fuente de producción (excluye tests)
sonar.sources=src/main/java
sonar.java.binaries=target/classes

# Pruebas unitarias
sonar.tests=src/test/java
sonar.java.test.binaries=target/test-classes

# Reporte de cobertura JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Codificación
sonar.sourceEncoding=UTF-8
sonar.java.source=17

# Exclusiones (no analizar código generado ni configuración)
sonar.exclusions=\
  **/GestionPruebasApplication.java,\
  **/config/**,\
  **/*Application.java,\
  **/selenium/**,\
  **/dto/**

# Exclusiones de cobertura (controllers de Thymeleaf, modelos JPA)
sonar.coverage.exclusions=\
  **/controller/**,\
  **/model/**,\
  **/repository/**,\
  **/config/**,\
  **/*Application.java

# Calidad mínima esperada (Quality Gate)
# A = 0 bugs, 0 vulnerabilidades, deuda técnica < 5%
sonar.qualitygate.wait=true
