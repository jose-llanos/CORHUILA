<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"><title>Dueños</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f0f4f8; }
    .header { background: #1565C0; color: white; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
    .header a { color: white; text-decoration: none; font-size: 13px; }
    .content { padding: 30px; }
    .btn-new { background: #28a745; color: white; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th { background: #1565C0; color: white; padding: 12px; text-align: left; font-size: 14px; }
    td { padding: 11px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    .btn-edit { background: #f57c00; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; }
    .btn-del { background: #e53935; color: white; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
    .alert-success { background: #d4edda; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    .alert-error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="header">
  <h2>👤 Gestión de Dueños</h2>
  <a href="/">← Inicio</a>
</div>
<div class="content">
  <div th:if="${mensaje}" class="alert-success" th:text="${mensaje}"></div>
  <div th:if="${error}" class="alert-error" th:text="${error}"></div>

  <a href="/duenios/nuevo" class="btn-new">+ Registrar Dueño</a>
  <table>
    <thead>
    <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Teléfono</th><th>Dirección</th><th>Acciones</th></tr>
    </thead>
    <tbody>
    <tr th:each="d : ${listaDuenios}">
      <td th:text="${d.id}"></td>
      <td th:text="${d.nombre}"></td>
      <td th:text="${d.correo}"></td>
      <td th:text="${d.telefono}"></td>
      <td th:text="${d.direccion}"></td>
      <td>
        <a th:href="@{'/duenios/' + ${d.id} + '/editar'}" class="btn-edit">Editar</a>
        <!-- ✅ CORRECCIÓN: th:if movido al input, no al form -->
        <form th:action="@{'/duenios/' + ${d.id} + '/eliminar'}" method="post" style="display:inline">
          <input type="hidden" th:if="${_csrf != null}"
                 th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn-del" onclick="return confirm('¿Eliminar dueño?')">Eliminar</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
