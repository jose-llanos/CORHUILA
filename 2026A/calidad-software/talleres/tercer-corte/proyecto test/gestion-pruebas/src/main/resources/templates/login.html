<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Clínica Veterinaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #1565C0;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #1565C0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1565C0;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0D47A1;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .info-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>
<div class="login-container">
    <h2>🐾 Clínica Veterinaria</h2>
    <div class="subtitle">Iniciar Sesión</div>

    <div th:if="${param.error}" class="error-message">
        ❌ Usuario o contraseña incorrectos
    </div>

    <div th:if="${param.logout}" class="info-message">
        ✅ Has cerrado sesión exitosamente
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>📧 Usuario</label>
            <input type="text" name="username" placeholder="Ingresa tu usuario" required autofocus>
        </div>

        <div class="form-group">
            <label>🔒 Contraseña</label>
            <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit">Ingresar</button>
    </form>

    <div class="footer">
        <p>🔐 Credenciales: <strong>admin / admin</strong> o <strong>user / user</strong></p>
    </div>
</div>
</body>
</html>
