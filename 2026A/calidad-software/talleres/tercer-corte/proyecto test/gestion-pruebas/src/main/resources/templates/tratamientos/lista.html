<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Tratamientos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f4f8; }
        .header { background: #1565C0; color: white; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header a { color: white; text-decoration: none; font-size: 13px; }
        .content { padding: 30px; }
        .btn-new { background: #28a745; color: white; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #1565C0; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { padding: 11px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-edit { background: #f57c00; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 12px; }
        .btn-del { background: #e53935; color: white; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
<div class="header">
    <h2>💊 Gestión de Tratamientos</h2>
    <a href="/">← Inicio</a>
</div>
<div class="content">
    <a href="/tratamientos/nuevo" class="btn-new">+ Nuevo Tratamiento</a>
    <table>
        <thead>
        <tr><th>ID</th><th>Descripción</th><th>Medicamento</th><th>Dosis</th><th>Cita</th><th>Acciones</th></tr>
        </thead>
        <tbody>
        <tr th:each="t : ${listaTratamientos}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.descripcion}"></td>
            <td th:text="${t.medicamento}"></td>
            <td th:text="${t.dosis}"></td>
            <td th:text="${t.cita != null ? '#' + t.cita.id + ' - ' + t.cita.motivo : '-'}"></td>
            <td>
                <a th:href="@{'/tratamientos/' + ${t.id} + '/editar'}" class="btn-edit">Editar</a>
                <form th:action="@{'/tratamientos/' + ${t.id} + '/eliminar'}" method="post" style="display:inline">
                    <button type="submit" class="btn-del" onclick="return confirm('¿Eliminar?')">Eliminar</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
