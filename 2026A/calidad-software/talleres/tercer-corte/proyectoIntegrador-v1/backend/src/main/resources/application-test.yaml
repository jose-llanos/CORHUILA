spring:
  datasource:
    url: jdbc:h2:mem:medicita_test
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: medicita-secret-key-for-jwt-authentication-2026-calidad-software
    expiration: 86400000

logging:
  level:
    com.medicita: DEBUG
    org.springframework.security: INFO
