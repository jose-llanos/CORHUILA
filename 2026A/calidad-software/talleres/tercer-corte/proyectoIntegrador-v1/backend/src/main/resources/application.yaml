spring:
  application:
    name: medicita

  datasource:
    url: jdbc:postgresql://localhost:5432/medicita_db
    username: medicita_user
    password: medicita_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  security:
    user:
      name: ""
      password: ""
      roles: []

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: medicita-secret-key-for-jwt-authentication-2026-calidad-software
    expiration: 86400000
  cors:
    allowed-origins: http://localhost,http://localhost:5173,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.medicita: DEBUG
    org.springframework.security: INFO
