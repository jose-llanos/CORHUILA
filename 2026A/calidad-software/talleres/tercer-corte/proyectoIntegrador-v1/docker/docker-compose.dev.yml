services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: medicita_db
      POSTGRES_USER: medicita_user
      POSTGRES_PASSWORD: medicita_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicita_user -d medicita_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - medicita-network

  sonarqube:
    image: sonarqube:10-community
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ports:
      - "9000:9000"
    networks:
      - medicita-network
    restart: unless-stopped

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  medicita-network:
    driver: bridge
