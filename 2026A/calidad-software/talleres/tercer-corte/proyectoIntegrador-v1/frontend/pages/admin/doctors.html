<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Médicos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header d-flex align-items-center justify-content-between">
        <div>
          <h1>Médicos</h1>
          <p>Gestión del cuerpo médico</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#doctorModal" id="btn-new">
          <i class="bi bi-plus-lg"></i> Nuevo médico
        </button>
      </div>

      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando médicos…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Especialidad</th>
                <th>Licencia médica</th>
                <th>Correo</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="doctors-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Doctor Modal -->
  <div class="modal fade" id="doctorModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">Nuevo médico</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="doctor-form" novalidate>
          <div class="modal-body">
            <input type="hidden" id="doctor-id">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="d-firstName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="d-lastName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Correo <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="d-email" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="d-password" placeholder="Mín. 8 caracteres" minlength="8">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Licencia médica <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="d-medicalLicense" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Especialidad <span class="text-danger">*</span></label>
                <select class="form-select" id="d-specialtyId" required>
                  <option value="">Selecciona una especialidad</option>
                </select>
              </div>
            </div>
            <div id="modal-alert" class="alert alert-danger mt-3 d-none"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" id="btn-save" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/admin/doctors.js"></script>
</body>
</html>
