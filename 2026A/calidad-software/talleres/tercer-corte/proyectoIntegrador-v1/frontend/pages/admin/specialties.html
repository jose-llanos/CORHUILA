<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Especialidades</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header d-flex align-items-center justify-content-between">
        <div>
          <h1>Especialidades</h1>
          <p>Gestión de especialidades médicas</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#specialtyModal" id="btn-new">
          <i class="bi bi-plus-lg"></i> Nueva especialidad
        </button>
      </div>

      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando especialidades…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="specialties-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Specialty Modal -->
  <div class="modal fade" id="specialtyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">Nueva especialidad</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="specialty-form" novalidate>
          <div class="modal-body">
            <input type="hidden" id="specialty-id">
            <div class="mb-3">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="s-name" required placeholder="Ej. Cardiología">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Descripción</label>
              <textarea class="form-control" id="s-description" rows="3" placeholder="Descripción de la especialidad"></textarea>
            </div>
            <div id="modal-alert" class="alert alert-danger d-none"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" id="btn-save" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/admin/specialties.js"></script>
</body>
</html>
