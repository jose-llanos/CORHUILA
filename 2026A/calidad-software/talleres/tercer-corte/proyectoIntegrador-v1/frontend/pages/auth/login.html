<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="auth-bg d-flex align-items-center justify-content-center min-vh-100">

  <a href="../../index.html" class="auth-back-btn">
    <i class="bi bi-arrow-left"></i> Volver
  </a>

  <div class="auth-card card p-4 p-md-5 mx-3">
    <div class="text-center mb-4">
      <div class="auth-logo-wrapper mb-3">
        <i class="bi bi-hospital-fill"></i>
      </div>
      <h1 class="h4 fw-bold mb-1">Bienvenido de nuevo</h1>
      <p class="text-muted small mb-0">Inicia sesión en MediCita</p>
    </div>

    <form id="form-login" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold small text-secondary">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text border-end-0">
            <i class="bi bi-envelope text-muted"></i>
          </span>
          <input type="email" class="form-control border-start-0 ps-1"
                 id="email" placeholder="usuario@ejemplo.com" required autocomplete="email">
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold small text-secondary">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" class="form-control border-start-0 border-end-0 ps-1"
                 id="password" placeholder="••••••••" required autocomplete="current-password">
          <button class="btn btn-outline-secondary border-start-0" type="button"
                  id="toggle-password" tabindex="-1" title="Mostrar/ocultar contraseña">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" id="btn-submit" class="btn btn-primary w-100 fw-semibold py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-0">
      ¿No tienes cuenta?
      <a href="register.html" class="text-decoration-none fw-semibold">Regístrate aquí</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { saveAuth, isAuthenticated, redirectToDashboard } from '../../js/utils/auth.js';
    import { post } from '../../js/utils/api.js';
    import { showToast } from '../../js/utils/toast.js';

    if (isAuthenticated()) redirectToDashboard();

    const form = document.getElementById('form-login');
    const btn  = document.getElementById('btn-submit');

    document.getElementById('toggle-password').addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showToast('Completa todos los campos.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Cargando...';

      try {
        const data = await post('/auth/login', { email, password });
        saveAuth(data.token, data.email, data.role, data.fullName);
        redirectToDashboard();
      } catch (err) {
        showToast(err.message || 'Credenciales incorrectas. Verifica tus datos.');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión';
      }
    });
  </script>
</body>
</html>
