<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Mis Citas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Mis Citas</h1>
        <p>Listado de citas asignadas</p>
      </div>

      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando citas…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Fecha y hora</th>
                <th>Paciente</th>
                <th>Motivo</th>
                <th>Notas</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="appointments-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Complete modal -->
  <div class="modal fade" id="completeModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Completar cita</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="complete-id">
          <label class="form-label fw-semibold">Notas clínicas (opcional)</label>
          <textarea class="form-control" id="complete-notes" rows="4" placeholder="Observaciones, diagnóstico, indicaciones…"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn-confirm-complete" class="btn btn-success">
            <i class="bi bi-check-lg"></i> Marcar completada
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/doctor/appointments.js"></script>
</body>
</html>
