<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Mis Permisos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header d-flex align-items-center justify-content-between">
        <div>
          <h1>Mis Permisos</h1>
          <p>Historial de solicitudes de permiso</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#leaveModal">
          <i class="bi bi-plus-lg"></i> Solicitar permiso
        </button>
      </div>

      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando permisos…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Desde</th>
                <th>Hasta</th>
                <th>Motivo</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="leaves-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Leave Request Modal -->
  <div class="modal fade" id="leaveModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Solicitar permiso</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="leave-form" novalidate>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
              <select class="form-select" id="l-type" required>
                <option value="">Selecciona el tipo</option>
                <option value="SICK_LEAVE">Incapacidad médica</option>
                <option value="VACATION">Vacaciones</option>
                <option value="PERSONAL">Personal</option>
              </select>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Fecha inicio <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="l-startDate" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Fecha fin <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="l-endDate" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Motivo <span class="text-danger">*</span></label>
              <textarea class="form-control" id="l-reason" rows="3" required placeholder="Describe el motivo del permiso"></textarea>
            </div>
            <div id="modal-alert" class="alert alert-danger d-none"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" id="btn-save" class="btn btn-primary">Enviar solicitud</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/doctor/leaves.js"></script>
</body>
</html>
