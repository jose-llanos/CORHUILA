<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Inicio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div>
          <h1 id="greeting">Bienvenido</h1>
          <p>Tus próximas citas médicas</p>
        </div>
        <a href="appointments.html" class="btn btn-primary">
          <i class="bi bi-plus-lg"></i> Agendar nueva cita
        </a>
      </div>

      <div id="spinner-area" class="spinner-wrapper">
        <div class="spinner-border text-primary spinner-border-sm"></div>
        <span>Cargando citas…</span>
      </div>

      <div id="cards-area" class="row g-3 d-none"></div>

      <div id="empty-msg" class="content-card text-center py-5 d-none">
        <i class="bi bi-calendar-x fs-1 text-muted"></i>
        <p class="mt-3 text-muted">No tienes citas próximas.</p>
        <a href="appointments.html" class="btn btn-primary mt-1">Agendar ahora</a>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/patient/dashboard.js"></script>
</body>
</html>
