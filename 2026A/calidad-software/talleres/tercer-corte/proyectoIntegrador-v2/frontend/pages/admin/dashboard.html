<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p>Resumen general del sistema</p>
      </div>

      <!-- Stats -->
      <div class="row g-3 mb-4" id="stats-row">
        <div class="col-12 d-flex align-items-center gap-2 text-muted">
          <div class="spinner-border spinner-border-sm"></div> Cargando estadísticas…
        </div>
      </div>

      <!-- Latest appointments -->
      <div class="page-header d-flex align-items-center justify-content-between">
        <div>
          <h1 class="h5 mb-0">Últimas citas</h1>
          <p>Todas las citas registradas en el sistema</p>
        </div>
      </div>

      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando citas…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Especialidad</th>
                <th>Fecha y hora</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="appointments-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/admin/dashboard.js"></script>
</body>
</html>
