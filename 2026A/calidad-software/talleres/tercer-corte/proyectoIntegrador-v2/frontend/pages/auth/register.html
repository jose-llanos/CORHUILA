<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Registro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="auth-bg d-flex align-items-center justify-content-center min-vh-100 py-4">

  <a href="login.html" class="auth-back-btn">
    <i class="bi bi-arrow-left"></i> Volver al login
  </a>

  <div class="auth-card card p-4 p-md-5 mx-3" style="max-width:560px">
    <div class="text-center mb-4">
      <div class="auth-logo-wrapper mb-3">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h1 class="h4 fw-bold mb-1">Crear cuenta</h1>
      <p class="text-muted small mb-0">Regístrate en MediCita</p>
    </div>

    <form id="form-register" novalidate>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-secondary">
            Nombre <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" class="form-control border-start-0 ps-1"
                   id="firstName" placeholder="Juan" required autocomplete="given-name">
          </div>
          <div class="invalid-feedback" id="err-firstName"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-secondary">
            Apellido <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" class="form-control border-start-0 ps-1"
                   id="lastName" placeholder="Pérez" required autocomplete="family-name">
          </div>
          <div class="invalid-feedback" id="err-lastName"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-secondary">
            Correo electrónico <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-envelope text-muted"></i></span>
            <input type="email" class="form-control border-start-0 ps-1"
                   id="email" placeholder="juan@ejemplo.com" required autocomplete="email">
          </div>
          <div class="invalid-feedback" id="err-email"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-secondary">
            Contraseña <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0 ps-1"
                   id="password" placeholder="Mín. 8 caracteres" required minlength="8"
                   autocomplete="new-password">
          </div>
          <div class="invalid-feedback" id="err-password"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-secondary">
            Número de documento <span class="text-danger">*</span>
          </label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-card-text text-muted"></i></span>
            <input type="text" class="form-control border-start-0 ps-1"
                   id="documentNumber" placeholder="1234567890" required>
          </div>
          <div class="invalid-feedback" id="err-documentNumber"></div>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold small text-secondary">Teléfono</label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-telephone text-muted"></i></span>
            <input type="tel" class="form-control border-start-0 ps-1"
                   id="phone" placeholder="3001234567" autocomplete="tel">
          </div>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold small text-secondary">Fecha de nacimiento</label>
          <div class="input-group">
            <span class="input-group-text border-end-0"><i class="bi bi-calendar3 text-muted"></i></span>
            <input type="date" class="form-control border-start-0 ps-1"
                   id="birthDate" autocomplete="bday">
          </div>
        </div>
      </div>

      <button type="submit" id="btn-submit" class="btn btn-primary w-100 fw-semibold py-2 mt-4">
        <i class="bi bi-person-check me-2"></i>Crear cuenta
      </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted small mb-0">
      ¿Ya tienes cuenta?
      <a href="login.html" class="text-decoration-none fw-semibold">Inicia sesión</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { post } from '../../js/utils/api.js';
    import { showToast } from '../../js/utils/toast.js';

    const form = document.getElementById('form-register');
    const btn  = document.getElementById('btn-submit');

    function clearErrors() {
      document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
      document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
    }

    function setFieldError(id, msg) {
      const input = document.getElementById(id);
      const err   = document.getElementById(`err-${id}`);
      if (input) input.classList.add('is-invalid');
      if (err)   err.textContent = msg;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const payload = {
        firstName:      document.getElementById('firstName').value.trim(),
        lastName:       document.getElementById('lastName').value.trim(),
        email:          document.getElementById('email').value.trim(),
        password:       document.getElementById('password').value,
        documentNumber: document.getElementById('documentNumber').value.trim(),
        phone:          document.getElementById('phone').value.trim() || null,
        birthDate:      document.getElementById('birthDate').value || null,
      };

      let valid = true;
      if (!payload.firstName)           { setFieldError('firstName',      'El nombre es requerido.');          valid = false; }
      if (!payload.lastName)            { setFieldError('lastName',       'El apellido es requerido.');         valid = false; }
      if (!payload.email)               { setFieldError('email',          'El correo es requerido.');           valid = false; }
      if (payload.password.length < 8)  { setFieldError('password',       'Mínimo 8 caracteres.');             valid = false; }
      if (!payload.documentNumber)      { setFieldError('documentNumber', 'El documento es requerido.');       valid = false; }
      if (!valid) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Cargando...';

      try {
        await post('/auth/register', payload);
        showToast('¡Cuenta creada exitosamente! Redirigiendo al login…', 'success');
        form.reset();
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        showToast(err.message || 'Error al registrar. Inténtalo de nuevo.', 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-check me-2"></i>Crear cuenta';
      }
    });
  </script>
</body>
</html>
