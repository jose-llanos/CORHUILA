<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Médico Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header">
        <h1 id="greeting">Bienvenido</h1>
        <p>Citas programadas para hoy</p>
      </div>

      <!-- Quick links -->
      <div class="row g-3 mb-4">
        <div class="col-auto">
          <a href="schedule.html" class="btn btn-outline-primary">
            <i class="bi bi-calendar-week"></i> Ver mi horario
          </a>
        </div>
        <div class="col-auto">
          <a href="leaves.html" class="btn btn-outline-secondary">
            <i class="bi bi-calendar-x"></i> Solicitar permiso
          </a>
        </div>
      </div>

      <!-- Today's appointments -->
      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando citas de hoy…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <div class="px-3 py-2 border-bottom d-flex align-items-center justify-content-between">
            <span class="fw-semibold text-muted small text-uppercase" id="today-label"></span>
          </div>
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Hora</th>
                <th>Paciente</th>
                <th>Motivo</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="today-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/doctor/dashboard.js"></script>
</body>
</html>
