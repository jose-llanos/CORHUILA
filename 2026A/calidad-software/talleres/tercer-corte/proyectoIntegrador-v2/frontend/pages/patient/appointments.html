<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Mis Citas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">

      <!-- Active appointments -->
      <div class="page-header">
        <h1>Mis Citas</h1>
        <p>Citas activas y nueva reserva</p>
      </div>

      <div class="table-card mb-4">
        <div class="px-3 pt-3 pb-2 border-bottom d-flex align-items-center justify-content-between">
          <span class="fw-semibold">Citas pendientes y confirmadas</span>
        </div>
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Médico</th>
                <th>Especialidad</th>
                <th>Fecha y hora</th>
                <th>Motivo</th>
                <th>Estado</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="appts-tbody"></tbody>
          </table>
          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
            <span id="page-info" class="small text-muted"></span>
            <div class="d-flex gap-2">
              <button id="btn-prev-page" class="btn btn-sm btn-outline-secondary" disabled>
                <i class="bi bi-chevron-left"></i> Anterior
              </button>
              <button id="btn-next-page" class="btn btn-sm btn-outline-secondary" disabled>
                Siguiente <i class="bi bi-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- New appointment wizard -->
      <div class="content-card">
        <h2 class="h5 fw-bold mb-3"><i class="bi bi-plus-circle text-primary me-2"></i>Nueva cita</h2>

        <!-- Step indicator -->
        <div class="step-indicator mb-4">
          <div class="step-pill active" id="step-1-pill">
            <div class="step-num">1</div>
            <span class="d-none d-sm-inline">Especialidad</span>
          </div>
          <div class="step-line"></div>
          <div class="step-pill" id="step-2-pill">
            <div class="step-num">2</div>
            <span class="d-none d-sm-inline">Médico</span>
          </div>
          <div class="step-line"></div>
          <div class="step-pill" id="step-3-pill">
            <div class="step-num">3</div>
            <span class="d-none d-sm-inline">Fecha y motivo</span>
          </div>
        </div>

        <!-- Step 1 -->
        <div id="step-1">
          <label class="form-label fw-semibold">Selecciona la especialidad</label>
          <select class="form-select mb-3" id="sel-specialty">
            <option value="">Cargando especialidades…</option>
          </select>
          <button class="btn btn-primary" id="btn-step1-next" disabled>
            Siguiente <i class="bi bi-arrow-right"></i>
          </button>
        </div>

        <!-- Step 2 -->
        <div id="step-2" class="d-none">
          <label class="form-label fw-semibold">Selecciona el médico</label>
          <div id="doctors-spinner" class="spinner-wrapper py-2">
            <div class="spinner-border text-primary spinner-border-sm"></div>
          </div>
          <select class="form-select mb-3 d-none" id="sel-doctor">
            <option value="">Selecciona un médico</option>
          </select>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" id="btn-step2-back">
              <i class="bi bi-arrow-left"></i> Atrás
            </button>
            <button class="btn btn-primary" id="btn-step2-next" disabled>
              Siguiente <i class="bi bi-arrow-right"></i>
            </button>
          </div>
        </div>

        <!-- Step 3 -->
        <div id="step-3" class="d-none">
          <div class="row g-3 mb-3">
            <div class="col-md-5">
              <label class="form-label fw-semibold">
                <i class="bi bi-calendar3 me-1"></i>Fecha <span class="text-danger">*</span>
              </label>
              <input type="date" class="form-control" id="appt-date" required>
              <small class="text-muted" id="appt-date-hint"></small>
            </div>
            <div class="col-md-7">
              <label class="form-label fw-semibold">
                <i class="bi bi-chat-left-text me-1"></i>Motivo de la consulta <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="appt-reason" placeholder="Describe brevemente el motivo" required>
            </div>
          </div>

          <label class="form-label fw-semibold">
            <i class="bi bi-clock me-1"></i>Horarios disponibles
          </label>
          <div id="slots-area" class="mb-3">
            <div class="slot-info">Selecciona una fecha para ver los horarios disponibles.</div>
          </div>

          <div class="d-flex gap-3 flex-wrap mb-3 ps-1">
            <span class="schedule-legend">
              <span class="legend-dot available"></span> Disponible
            </span>
            <span class="schedule-legend">
              <span class="legend-dot unavailable"></span> Ocupado / no disponible
            </span>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" id="btn-step3-back">
              <i class="bi bi-arrow-left"></i> Atrás
            </button>
            <button class="btn btn-primary" id="btn-book" disabled>
              <i class="bi bi-calendar-check"></i> Agendar cita
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/patient/appointments.js"></script>
</body>
</html>
