<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCita – Historial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <div id="navbar"></div>
    <main class="main-content">
      <div class="page-header">
        <h1>Historial médico</h1>
        <p>Citas completadas y canceladas</p>
      </div>

      <div class="table-card">
        <div id="table-spinner" class="spinner-wrapper">
          <div class="spinner-border text-primary spinner-border-sm"></div>
          <span>Cargando historial…</span>
        </div>
        <div id="table-wrapper" class="d-none">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Médico</th>
                <th>Especialidad</th>
                <th>Fecha y hora</th>
                <th>Motivo</th>
                <th>Notas clínicas</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../../js/patient/history.js"></script>
</body>
</html>
