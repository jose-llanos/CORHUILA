spring:
  datasource:
    url: jdbc:h2:mem:sgplab_testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:import-test.sql

sgp:
  security:
    jwt:
      secret: test-secret-key-only-for-test-profile-must-be-long-enough-256-bits-abcdefghijklmnop
      expiration-ms: 3600000
      issuer: sgp-lab-test

logging:
  level:
    root: WARN
    com.sgplab.backend: INFO
