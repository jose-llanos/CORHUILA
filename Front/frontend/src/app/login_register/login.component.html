<div class="container-fluid bg-custom d-flex align-items-center justify-content-center vh-100">
    <div class="row w-75 d-flex align-items-center justify-content-center">
        <!-- Logo -->
        <div class="col-md-5 d-flex flex-column align-items-center text-center">
            <img src="https://i.postimg.cc/C14MR50C/o-bg-remover-gen-2t-S4-Kz-Nu-QLRM05-Sby-I05npm-XRTc.png" 
                 alt="Logo MAP PARKING" class="img-fluid mb-4" style="max-width: 90%;">
        </div>

        <!-- Formulario de inicio de sesión -->
        <div class="col-md-5 bg-white p-4 rounded shadow">
            <h2 class="text-center fw-bold">¡Bienvenido de nuevo!</h2>
            <form (ngSubmit)="login()">
                <div class="mb-3">
                    <input type="text" [(ngModel)]="email" name="email" class="form-control border-dark" 
                           placeholder="E-mail" required>
                </div>
                <div class="mb-3 position-relative">
                    <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" 
                           class="form-control border-dark" placeholder="Contraseña" required>
                    <span class="position-absolute end-0 top-50 translate-middle-y me-2" style="cursor: pointer;" 
                          (click)="togglePasswordVisibility()">
                        <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                    </span>
                </div>
                <!-- Enlace de recuperación de contraseña -->
                 
                <div class="text-center mt-2">
                    <span>¿Olvidaste tu contraseña? recuperala </span> 
                    <a routerLink="/recuperarcontrasenia" class="text-primary" style="cursor: pointer;">aquí</a>
                </div><br>
                

                <!-- Mensaje de error -->
                <div *ngIf="errorMessage" class="alert alert-danger text-center p-2">
                    {{ errorMessage }}
                </div>

                <!-- Botón con indicador de carga -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary fw-bold" [disabled]="isLoading">
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                        Iniciar sesión
                    </button>
                </div>

                <div class="mt-3 d-grid">
                    <button class="btn btn-primary fw-bold" type="button" [routerLink]="['/login/register']">
                        Registrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
