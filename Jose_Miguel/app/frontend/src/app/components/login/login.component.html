<div class="registro-container">
  <div class="form-container">
    <form #loginForm="ngForm" (ngSubmit)="iniciarSesion()" novalidate>
      <label class="small-label">Email:</label>
      <input 
        type="email" 
        [(ngModel)]="usuario.email" 
        name="email" 
        required 
        pattern="^[^@]+@[^@]+\.[a-zA-Z]{2,}$" 
        #email="ngModel" />
      <div *ngIf="email.invalid && email.touched">
        <small>Ingrese un correo válido</small>
      </div>
      <label class="small-label">Contraseña:</label>
      <div class="password-container">
        <input [type]="mostrarContrasenia ? 'text' : 'password'" 
              [(ngModel)]="usuario.password" 
              name="password" 
              required 
              #password="ngModel" 
              pattern="^(?=.*[A-Z])(?=.*\d).{6,}$" />
        <i class="fa-solid" [ngClass]="{'fa-eye': !mostrarContrasenia, 'fa-eye-slash': mostrarContrasenia}" 
          (click)="toggleMostrarContrasenia()"></i>
      </div>
      <div *ngIf="password.invalid && password.touched">
        <small>La contraseña debe incluir al menos una mayúscula, un número y tener mínimo 6 caracteres.</small>
      </div>
      <button type="submit" [disabled]="loginForm.invalid">Iniciar sesión</button>
    </form>
    
    <p class="login-text">
      <a routerLink="/recuperarcontrasenia">¿Olvidó su contraseña?</a>
    </p>
    
    <p class="login-text">¿No tienes una cuenta? <a routerLink="/register">Regístrate</a></p>
  </div>

  <div class="image-container">
    <img src="https://aguagenesis.com/wp-content/uploads/2019/03/Lavaderos-de-Carros.jpg" alt="Car Wash">
  </div>
</div>

<div *ngIf="mensajeModal" class="modal">
  <div class="modal-content">
    <p>{{ mensajeModal }}</p>
    <button (click)="cerrarModal()">Cerrar</button>
  </div>
</div>
