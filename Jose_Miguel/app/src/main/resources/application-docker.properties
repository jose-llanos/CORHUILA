# Perfil específico para Docker
# Configuracion MySQL para Docker (el host es 'mysql', no localhost)
spring.datasource.url=jdbc:mysql://mysql:3306/autospark?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
spring.datasource.username=autospark_user
spring.datasource.password=autospark_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion JPA/Hibernate para Docker
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging reducido para producción
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Puerto
server.port=8080
