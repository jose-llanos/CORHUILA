# Configuracion MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/autospark?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Zona horaria
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# Configuracion import.sql
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

