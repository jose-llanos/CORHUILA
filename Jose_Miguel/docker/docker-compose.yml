version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: autospark-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: autospark
      MYSQL_USER: autospark_user
      MYSQL_PASSWORD: autospark_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - autospark-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: autospark-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MAIL_USERNAME: servicioalclienteautospark@gmail.com
      MAIL_PASSWORD: "bdyo nzey xtyc qdlb"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - autospark-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: autospark-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - autospark-network

  selenium-hub:
    image: selenium/hub:4.18
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    networks:
      - autospark-network

  chrome:
    image: selenium/node-chrome:4.18
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
    networks:
      - autospark-network

  firefox:
    image: selenium/node-firefox:4.18
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
    networks:
      - autospark-network

  test-runner:
    image: maven:3.9-eclipse-temurin-17
    container_name: autospark-tests
    volumes:
      - ../app:/app
      - ../reports:/reports
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    depends_on:
      - backend
      - mysql
      - selenium-hub
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: autospark
      DB_USER: autospark_user
      DB_PASSWORD: autospark_password
      SELENIUM_HUB_URL: http://selenium-hub:4444
    command: >
      sh -c "
        apt-get update && apt-get install -y default-mysql-client &&
        echo '=== INICIANDO PRUEBAS ===' &&
        sleep 15 &&
        echo 'Insertando usuario de prueba...' &&
        mysql -h mysql -u autospark_user -pautospark_password autospark -e \"INSERT INTO usuarios (fullname, identity_card, email, phone, contrasenia, licenseplate, role) VALUES ('Juan Perez', '12345678', 'juan@test.com', '3001234567', SHA2('Password123', 256), 'ABC123', 'CUSTOMER') ON DUPLICATE KEY UPDATE fullname = VALUES(fullname);\" &&
        echo 'Ejecutando pruebas unitarias...' &&
        mvn test -Dtest='**/unitarias/**/*Test' &&
        echo 'Ejecutando pruebas Selenium...' &&
        if [ -f testng.xml ]; then mvn test -Dsurefire.suiteXmlFiles=testng.xml; else mvn test -Dtest='**/selenium/**/*'; fi &&
        echo 'Generando reporte de cobertura...' &&
        mvn jacoco:report &&
        mkdir -p /reports/junit /reports/jacoco /reports/selenium &&
        cp -r target/surefire-reports/* /reports/junit/ 2>/dev/null &&
        cp -r target/site/jacoco/* /reports/jacoco/ 2>/dev/null &&
        cp -r test-output/* /reports/selenium/ 2>/dev/null &&
        echo 'Pruebas completadas'
      "
    networks:
      - autospark-network
    profiles:
      - test

networks:
  autospark-network:
    driver: bridge

volumes:
  mysql_data:
